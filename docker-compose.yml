services:
  abacus:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - abacus-data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/abacus.db
      - ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  abacus-data:
