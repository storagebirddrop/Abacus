name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Go build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (required for go:embed)
        run: npm ci && npm run build
        working-directory: web

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      # Enforce a coverage floor so the suite can't silently regress. The floor
      # is intentionally conservative (current total under Go 1.26, which counts
      # test-less packages, is ~29.6%); raise it as coverage improves rather than
      # chasing a number that blocks unrelated work.
      - name: Coverage gate
        run: |
          MIN=25.0
          go test -coverprofile=coverage.out ./...
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${total}% (floor: ${MIN}%)"
          awk -v t="$total" -v m="$MIN" 'BEGIN { exit (t+0 >= m+0) ? 0 : 1 }' \
            || { echo "::error::coverage ${total}% is below the ${MIN}% floor"; exit 1; }

      - name: Test (race detector)
        run: go test -race ./...

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Test
        run: npm test
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
